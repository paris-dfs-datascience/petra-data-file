# Integration test cases for the validation pipeline.
#
# Each case runs a PDF through the real validation pipeline (live LLM calls)
# and asserts that every listed rule produces the expected verdict.
#
# Requires a valid .env with API keys (OPENAI_API_KEY or ANTHROPIC_API_KEY).
#
# ─────────────────────────────────────────────────────────────
# HOW TO ADD A NEW CASE
# ─────────────────────────────────────────────────────────────
# 1. Place the PDF in tests/fixtures/documents/
# 2. Add a case block below with `id`, `document`, and `rules`
#    (leave `expected` out for now)
# 3. Run the discovery script to see what the pipeline actually returns:
#      python scripts/update_integration_expectations.py
# 4. The script prints a ready-to-paste `expected` block — review the
#    verdicts, paste them into the case, and commit.
#
# ─────────────────────────────────────────────────────────────
# RUNNING THE TESTS
# ─────────────────────────────────────────────────────────────
#   pytest tests/integration -m integration           # run all cases
#   pytest tests/integration -m integration -k foo    # filter by name
#   pytest tests/integration -m integration -v        # verbose output
#
# ─────────────────────────────────────────────────────────────
# FIELD REFERENCE
# ─────────────────────────────────────────────────────────────
# id            Unique snake_case identifier for this case (used as the
#               pytest node prefix, e.g. my_fund/BS-FMT)
# description   Optional free-text note — why this case exists, what it covers
# document      Path to the PDF relative to the repo root
# rules         Rule IDs from rules/rules.json to run for this document
# expected      List of per-rule assertions
#   rule_id       Must be present in the `rules` list above
#   verdict       One of: pass | fail | needs_review | not_applicable
#   matched_pages (optional) 1-based page numbers where the rule fired;
#                 omit if you do not need to assert specific pages
#
# ─────────────────────────────────────────────────────────────
# EXAMPLE (copy-paste below and fill in to create a new test case)
# ─────────────────────────────────────────────────────────────
# cases:
#   - id: my_test_case
#     description: "A description of what this case is testing and why it exists"
#     document: tests/fixtures/documents/document_name.pdf
#     rules:
#       - BS-FMT
#       - NUM-REFOOT
#       - GRAM-SPELL
#     expected:

#       # Basic: assert the overall verdict aggregated across all applicable pages.
#       - rule_id: BS-FMT
#         verdict: pass
#
#       # matched_pages: also assert which 1-based page numbers the rule fired on.
#       - rule_id: GRAM-SPELL
#         verdict: fail
#         matched_pages: [5, 9]
#
#       # pages: scope the verdict to specific pages only. All other pages are excluded from this assertion.
#       # Multi-assertion is supported: same rule, different page subsets and verdicts.
#       # The test suite passes only when ALL assertions hold.
#       - rule_id: NUM-REFOOT
#         verdict: fail
#         pages: [1]
#       - rule_id: NUM-REFOOT
#         verdict: pass
#         pages: [2, 3]

cases:
  - id: number_split_formatting
    description: "Tests that numbers are not split with a whitespace by the pdfplumber parser"
    document: tests/fixtures/documents/pdfplumber_number_split_scenarios.pdf
    rules:
      - NUM-REFOOT
      - NUM-CROSSFOOT
    expected:
      - rule_id: NUM-REFOOT
        verdict: pass
      - rule_id: NUM-CROSSFOOT
        verdict: pass
  - id: text_underline_validation
    description: "Tests that statement totals and subtotals are correctly underlined -single or double-"
    document: tests/fixtures/documents/underline_test_scenarios.pdf
    rules:
      - FMT-DOUBLE-UNDERLINE
    expected:
      - rule_id: FMT-DOUBLE-UNDERLINE
        verdict: pass
        pages: [7, 9, 11]
      - rule_id: FMT-DOUBLE-UNDERLINE
        verdict: fail
        pages: [1, 2, 3, 4, 5, 6, 8, 10, 12]

  # ─────────────────────────────────────────────────────────────────────────
  # Ground-truth cases from human review of 10 Error/Corrected PDF pairs.
  # All fund names are anonymised (fund_01 … fund_10).
  #
  # COVERAGE GAPS — error categories with no existing rule to catch them:
  #   LINE-ORDER      : line item ordering within statement sections (fund_01)
  #   STMT-PERIOD     : statement period header vs actual data date range (fund_02)
  #   LABEL-ACCURACY  : line item / note label factual accuracy (fund_04, fund_07)
  #   NOTE-NUMERIC    : note dollar amount vs supporting schedules (fund_10)
  #   MISSING-CONTENT : missing required rows or entire statement sections (fund_03)
  # ─────────────────────────────────────────────────────────────────────────

  # ────────────────────────────────────────────────────────────────────────────
  # 1. Fund 01
  #
  # ERRORS CAUGHT BY EXISTING RULES:
  #   E-5 (p.7): SCF label truncated — missing closing parenthetical → GRAM-SPELL
  #   E-6 (p.7): SCF label truncated — missing qualifying phrase → GRAM-SPELL
  #
  # COVERAGE GAPS (human-caught, no existing rule fires):
  #   E-1 (p.3): Two liability line items swapped in BS Liabilities → LINE-ORDER gap
  #   E-3 (p.7): Two SCF operating line items swapped → LINE-ORDER gap
  #   E-4 (p.7): Two SCF operating line items swapped → LINE-ORDER gap
  #
  # NOT AN ERROR:
  #   E-2 (p.4): Schedule of Investments text-extraction artifact; visual content identical
  # ────────────────────────────────────────────────────────────────────────────
  - id: fund_01_error
    description: >-
      Fund 01 Q2 2025 financial statements.
      2 SCF label truncation errors on p.7 (GRAM-SPELL).
      3 line-item ordering errors on pp.3 and 7 (LINE-ORDER coverage gap — no existing rule).
    document: tests/fixtures/documents/fund_01_q2_2025_errors.pdf
    rules:
      - FMT-HEADINGS
      - FMT-VISUAL-INTEGRITY
      - FMT-DOLLAR-SIGNS
      - FMT-GLOBAL
      - FMT-DOUBLE-UNDERLINE
      - RND-GLOBAL
      - NUM-REFOOT
      - NUM-CROSSFOOT
      - SIG-GLOBAL
      - GRAM-SPELL
      - DATE-INTEGRITY-FULL
      - DATE-LOGIC-ORDER
      - CVR-PERIOD-PHRASING
      - CVR-DATE-CHECK
      - BS-FMT
      - ARITH-ASSETS=LIABS+CAP
      - SOI-FMT
      - SOI-FOOTNOTE-XREF
      - OPS-FMT
      - SCF-SIGNAGE
      - SCF-RECONCILE-CASH
    expected:
      - rule_id: FMT-HEADINGS
        verdict: pass
      # E-2: text-extraction artifact on p.4 — visual layout identical, not a real error
      - rule_id: FMT-VISUAL-INTEGRITY
        verdict: pass
      - rule_id: FMT-DOLLAR-SIGNS
        verdict: pass
      - rule_id: FMT-GLOBAL
        verdict: pass
      - rule_id: FMT-DOUBLE-UNDERLINE
        verdict: pass
      - rule_id: RND-GLOBAL
        verdict: pass
      - rule_id: NUM-REFOOT
        verdict: pass
      - rule_id: NUM-CROSSFOOT
        verdict: pass
      - rule_id: SIG-GLOBAL
        verdict: pass
      # E-5 (p.7): SCF label omits closing parenthetical
      # E-6 (p.7): SCF label omits qualifying phrase
      - rule_id: GRAM-SPELL
        verdict: fail
        matched_pages: [7]
      - rule_id: DATE-INTEGRITY-FULL
        verdict: pass
      - rule_id: DATE-LOGIC-ORDER
        verdict: pass
      - rule_id: CVR-PERIOD-PHRASING
        verdict: pass
      - rule_id: CVR-DATE-CHECK
        verdict: pass
      # E-1 (p.3): Two liability line items swapped in Liabilities section.
      # BS-FMT does not check line item ordering within subsections — LINE-ORDER coverage gap.
      - rule_id: BS-FMT
        verdict: pass
      - rule_id: ARITH-ASSETS=LIABS+CAP
        verdict: pass
      - rule_id: SOI-FMT
        verdict: pass
      - rule_id: SOI-FOOTNOTE-XREF
        verdict: pass
      - rule_id: OPS-FMT
        verdict: pass
      - rule_id: SCF-SIGNAGE
        verdict: pass
      # E-3 (p.7): Two SCF operating line items swapped — LINE-ORDER gap
      # E-4 (p.7): Two SCF operating line items swapped — LINE-ORDER gap
      - rule_id: SCF-RECONCILE-CASH
        verdict: pass

  # ────────────────────────────────────────────────────────────────────────────
  # 2. Fund 02
  #
  # ERRORS CAUGHT BY EXISTING RULES:
  #   F-1 (p.4): Statement of Changes header shows inception-to-date period, data is quarterly → FMT-HEADINGS
  #   F-2 (p.5): Cash Flows header has same inception-to-date error → FMT-HEADINGS
  #   F-3 (p.5): SCF label names wrong cash activity — factual error → GRAM-SPELL
  #
  # COVERAGE GAPS:
  #   F-1, F-2: FMT-HEADINGS may detect heading anomaly but does not validate that the
  #             period description matches the actual data range → STMT-PERIOD gap
  # ────────────────────────────────────────────────────────────────────────────
  - id: fund_02_error
    description: >-
      Fund 02 Q3 2025 financial statements.
      2 wrong period headers on pp.4-5 (inception-to-date text on quarterly statements).
      1 label factual error on p.5 (wrong cash activity description).
    document: tests/fixtures/documents/fund_02_q3_2025_errors.pdf
    rules:
      - FMT-HEADINGS
      - FMT-VISUAL-INTEGRITY
      - FMT-DOLLAR-SIGNS
      - FMT-GLOBAL
      - FMT-DOUBLE-UNDERLINE
      - RND-GLOBAL
      - NUM-REFOOT
      - NUM-CROSSFOOT
      - SIG-GLOBAL
      - GRAM-SPELL
      - DATE-INTEGRITY-FULL
      - DATE-LOGIC-ORDER
      - CVR-PERIOD-PHRASING
      - CVR-DATE-CHECK
      - BS-FMT
      - ARITH-ASSETS=LIABS+CAP
      - SOI-FMT
      - SOI-FOOTNOTE-XREF
      - OPS-FMT
      - SCF-SIGNAGE
      - SCF-RECONCILE-CASH
    expected:
      # F-1 (p.4): Statement header shows inception-to-date period; document contains quarterly data only
      # F-2 (p.5): Same wrong inception-to-date header on Statement of Cash Flows
      - rule_id: FMT-HEADINGS
        verdict: fail
        matched_pages: [4, 5]
      - rule_id: FMT-VISUAL-INTEGRITY
        verdict: pass
      - rule_id: FMT-DOLLAR-SIGNS
        verdict: pass
      - rule_id: FMT-GLOBAL
        verdict: pass
      - rule_id: FMT-DOUBLE-UNDERLINE
        verdict: pass
      - rule_id: RND-GLOBAL
        verdict: pass
      - rule_id: NUM-REFOOT
        verdict: pass
      - rule_id: NUM-CROSSFOOT
        verdict: pass
      - rule_id: SIG-GLOBAL
        verdict: pass
      # F-3 (p.5): SCF label names the wrong type of cash activity; changes meaning of the line
      - rule_id: GRAM-SPELL
        verdict: fail
        matched_pages: [5]
      - rule_id: DATE-INTEGRITY-FULL
        verdict: pass
      - rule_id: DATE-LOGIC-ORDER
        verdict: pass
      # No separate cover page in this document
      - rule_id: CVR-PERIOD-PHRASING
        verdict: not_applicable
      - rule_id: CVR-DATE-CHECK
        verdict: not_applicable
      - rule_id: BS-FMT
        verdict: pass
      - rule_id: ARITH-ASSETS=LIABS+CAP
        verdict: pass
      - rule_id: SOI-FMT
        verdict: pass
      - rule_id: SOI-FOOTNOTE-XREF
        verdict: pass
      - rule_id: OPS-FMT
        verdict: pass
      - rule_id: SCF-SIGNAGE
        verdict: pass
      - rule_id: SCF-RECONCILE-CASH
        verdict: pass

  # ────────────────────────────────────────────────────────────────────────────
  # 3. Fund 03
  #
  # ERRORS CAUGHT BY EXISTING RULES:
  #   A-1 (p.5): Erroneous dollar sign on a line item row → FMT-DOLLAR-SIGNS
  #   A-2 (p.5): Possessive apostrophe error in Operations → GRAM-SPELL
  #   A-4 (p.5): GP and LP column values swapped → NUM-CROSSFOOT
  #   A-5, A-6 (p.7): Possessive apostrophe errors in Cash Flows → GRAM-SPELL
  #
  # COVERAGE GAPS:
  #   A-3 (p.5): Extra row present in Error, absent in Corrected →
  #              MISSING-CONTENT gap; no existing rule detects unexpected/missing expense rows
  # ────────────────────────────────────────────────────────────────────────────
  - id: fund_03_error
    description: >-
      Fund 03 Q2 2025 combined financial statements.
      1 dollar sign error p.5 (FMT-DOLLAR-SIGNS); 3 possessive apostrophe typos pp.5,7 (GRAM-SPELL);
      GP/LP column values swapped p.5 (NUM-CROSSFOOT);
      extra row p.5 (MISSING-CONTENT coverage gap).
    document: tests/fixtures/documents/fund_03_q2_2025_errors.pdf
    rules:
      - FMT-HEADINGS
      - FMT-VISUAL-INTEGRITY
      - FMT-DOLLAR-SIGNS
      - FMT-GLOBAL
      - FMT-DOUBLE-UNDERLINE
      - RND-GLOBAL
      - NUM-REFOOT
      - NUM-CROSSFOOT
      - SIG-GLOBAL
      - GRAM-SPELL
      - DATE-INTEGRITY-FULL
      - DATE-LOGIC-ORDER
      - CVR-PERIOD-PHRASING
      - CVR-DATE-CHECK
      - BS-FMT
      - ARITH-ASSETS=LIABS+CAP
      - SOI-FMT
      - SOI-FOOTNOTE-XREF
      - OPS-FMT
      - SCF-SIGNAGE
      - SCF-RECONCILE-CASH
    expected:
      - rule_id: FMT-HEADINGS
        verdict: pass
      - rule_id: FMT-VISUAL-INTEGRITY
        verdict: pass
      # A-1 (p.5): Dollar sign appears on a line item row where it should not
      - rule_id: FMT-DOLLAR-SIGNS
        verdict: fail
        matched_pages: [5]
      - rule_id: FMT-GLOBAL
        verdict: pass
      - rule_id: FMT-DOUBLE-UNDERLINE
        verdict: pass
      - rule_id: RND-GLOBAL
        verdict: pass
      - rule_id: NUM-REFOOT
        verdict: pass
      # A-4 (p.5): GP column shows LP value and vice versa; per-column subtotals disagree
      #             with actual column sums
      - rule_id: NUM-CROSSFOOT
        verdict: fail
        matched_pages: [5]
      - rule_id: SIG-GLOBAL
        verdict: pass
      # A-2 (p.5): Possessive apostrophe error — singular vs plural form
      # A-5 (p.7): Same error in Statement of Cash Flows (first instance)
      # A-6 (p.7): Same error in Statement of Cash Flows (second instance)
      - rule_id: GRAM-SPELL
        verdict: fail
        matched_pages: [5, 7]
      - rule_id: DATE-INTEGRITY-FULL
        verdict: pass
      - rule_id: DATE-LOGIC-ORDER
        verdict: pass
      - rule_id: CVR-PERIOD-PHRASING
        verdict: not_applicable
      - rule_id: CVR-DATE-CHECK
        verdict: not_applicable
      - rule_id: BS-FMT
        verdict: pass
      - rule_id: ARITH-ASSETS=LIABS+CAP
        verdict: pass
      - rule_id: SOI-FMT
        verdict: pass
      - rule_id: SOI-FOOTNOTE-XREF
        verdict: pass
      # A-3 (p.5): Extra row in Error version not present in Corrected.
      # No existing rule checks for unexpected expense rows — MISSING-CONTENT coverage gap.
      - rule_id: OPS-FMT
        verdict: pass
      - rule_id: SCF-SIGNAGE
        verdict: pass
      - rule_id: SCF-RECONCILE-CASH
        verdict: pass

  # ────────────────────────────────────────────────────────────────────────────
  # 4. Fund 04
  #
  # ERRORS CAUGHT BY EXISTING RULES:
  #   GC-1 (p.1): Cover title has wrong "Consolidated" prefix → FMT-HEADINGS
  #   GC-2 (p.1): Cover date shows date only, not full period description → CVR-PERIOD-PHRASING
  #   GC-3 (p.2): TOC entries have wrong "Consolidated" prefix → FMT-HEADINGS
  #   GC-4 (pp.3-7): All statement headers have wrong "Consolidated" prefix → FMT-HEADINGS
  #   GC-6 (p.3): Singular vs plural error in liability line item label → GRAM-SPELL
  #
  # COVERAGE GAPS:
  #   GC-5 (p.3): Column header uses wrong member terminology → LABEL-ACCURACY gap
  #   GC-7 (p.8): Note 1 contains entirely different content → LABEL-ACCURACY gap
  #   GC-8 (p.8): Role terminology differs from standard → LABEL-ACCURACY gap
  # ────────────────────────────────────────────────────────────────────────────
  - id: fund_04_error
    description: >-
      Fund 04 Q2 2025 financial statements.
      "Consolidated" prefix incorrectly added to cover (p.1), TOC (p.2), and all statement
      headers (pp.3-7) (FMT-HEADINGS). Cover period description truncated (p.1) (CVR-PERIOD-PHRASING).
      Spelling error on p.3 (GRAM-SPELL).
      Gaps: column header terminology p.3, Note 1 content p.8, role terminology p.8 (LABEL-ACCURACY).
    document: tests/fixtures/documents/fund_04_q2_2025_errors.pdf
    rules:
      - FMT-HEADINGS
      - FMT-VISUAL-INTEGRITY
      - FMT-DOLLAR-SIGNS
      - FMT-GLOBAL
      - FMT-DOUBLE-UNDERLINE
      - RND-GLOBAL
      - NUM-REFOOT
      - NUM-CROSSFOOT
      - SIG-GLOBAL
      - GRAM-SPELL
      - DATE-INTEGRITY-FULL
      - DATE-LOGIC-ORDER
      - CVR-PERIOD-PHRASING
      - CVR-DATE-CHECK
      - BS-FMT
      - ARITH-ASSETS=LIABS+CAP
      - SOI-FMT
      - SOI-FOOTNOTE-XREF
      - OPS-FMT
      - SCF-SIGNAGE
      - SCF-RECONCILE-CASH
    expected:
      # GC-1 (p.1): Cover title reads "Consolidated Financial Statements" — no consolidation occurred
      # GC-3 (p.2): Every TOC line carries "Consolidated" prefix
      # GC-4 (pp.3-7): Each statement header reads "Consolidated Statement of ..."
      - rule_id: FMT-HEADINGS
        verdict: fail
        matched_pages: [1, 2, 3, 4, 5, 6, 7]
      - rule_id: FMT-VISUAL-INTEGRITY
        verdict: pass
      - rule_id: FMT-DOLLAR-SIGNS
        verdict: pass
      - rule_id: FMT-GLOBAL
        verdict: pass
      - rule_id: FMT-DOUBLE-UNDERLINE
        verdict: pass
      - rule_id: RND-GLOBAL
        verdict: pass
      - rule_id: NUM-REFOOT
        verdict: pass
      - rule_id: NUM-CROSSFOOT
        verdict: pass
      - rule_id: SIG-GLOBAL
        verdict: pass
      # GC-6 (p.3): Singular vs plural error in liability label
      # GC-8 (p.8): Role terminology differs from standard — GRAM-SPELL partial coverage
      - rule_id: GRAM-SPELL
        verdict: fail
        matched_pages: [3, 8]
      - rule_id: DATE-INTEGRITY-FULL
        verdict: pass
      - rule_id: DATE-LOGIC-ORDER
        verdict: pass
      # GC-2 (p.1): Cover shows date only instead of full period phrasing
      - rule_id: CVR-PERIOD-PHRASING
        verdict: fail
        matched_pages: [1]
      - rule_id: CVR-DATE-CHECK
        verdict: pass
      - rule_id: BS-FMT
        verdict: pass
      - rule_id: ARITH-ASSETS=LIABS+CAP
        verdict: pass
      - rule_id: SOI-FMT
        verdict: pass
      - rule_id: SOI-FOOTNOTE-XREF
        verdict: pass
      - rule_id: OPS-FMT
        verdict: pass
      - rule_id: SCF-SIGNAGE
        verdict: pass
      - rule_id: SCF-RECONCILE-CASH
        verdict: pass

