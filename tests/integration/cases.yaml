# Integration test cases for the validation pipeline.
#
# Each case runs a PDF through the real validation pipeline (live LLM calls)
# and asserts that every listed rule produces the expected verdict.
#
# Requires a valid .env with API keys (OPENAI_API_KEY or ANTHROPIC_API_KEY).
#
# ─────────────────────────────────────────────────────────────
# HOW TO ADD A NEW CASE
# ─────────────────────────────────────────────────────────────
# 1. Place the PDF in tests/fixtures/documents/
# 2. Add a case block below with `id`, `document`, and `rules`
#    (leave `expected` out for now)
# 3. Run the discovery script to see what the pipeline actually returns:
#      python scripts/update_integration_expectations.py
# 4. The script prints a ready-to-paste `expected` block — review the
#    verdicts, paste them into the case, and commit.
#
# ─────────────────────────────────────────────────────────────
# RUNNING THE TESTS
# ─────────────────────────────────────────────────────────────
#   pytest tests/integration -m integration           # run all cases
#   pytest tests/integration -m integration -k foo    # filter by name
#   pytest tests/integration -m integration -v        # verbose output
#
# ─────────────────────────────────────────────────────────────
# FIELD REFERENCE
# ─────────────────────────────────────────────────────────────
# id            Unique snake_case identifier for this case (used as the
#               pytest node prefix, e.g. my_fund/BS-FMT)
# description   Optional free-text note — why this case exists, what it covers
# document      Path to the PDF relative to the repo root
# rules         Rule IDs from rules/rules.json to run for this document
# expected      List of per-rule assertions
#   rule_id       Must be present in the `rules` list above
#   verdict       One of: pass | fail | needs_review | not_applicable
#   matched_pages (optional) 1-based page numbers where the rule fired;
#                 omit if you do not need to assert specific pages
#
# ─────────────────────────────────────────────────────────────
# EXAMPLE (copy-paste below and fill in to create a new test case)
# ─────────────────────────────────────────────────────────────
# cases:
#   - id: my_test_case
#     description: "A description of what this case is testing and why it exists"
#     document: tests/fixtures/documents/document_name.pdf
#     rules:
#       - BS-FMT
#       - NUM-REFOOT
#       - GRAM-SPELL
#     expected:

#       # Basic: assert the overall verdict aggregated across all applicable pages.
#       - rule_id: BS-FMT
#         verdict: pass
#
#       # matched_pages: also assert which 1-based page numbers the rule fired on.
#       - rule_id: GRAM-SPELL
#         verdict: fail
#         matched_pages: [5, 9]
#
#       # pages: scope the verdict to specific pages only. All other pages are excluded from this assertion.
#       # Multi-assertion is supported: same rule, different page subsets and verdicts.
#       # The test suite passes only when ALL assertions hold.
#       - rule_id: NUM-REFOOT
#         verdict: fail
#         pages: [1]
#       - rule_id: NUM-REFOOT
#         verdict: pass
#         pages: [2, 3]

cases:
  - id: number_split_formatting
    description: "Tests that numbers are not split with a whitespace by the pdfplumber parser"
    document: tests/fixtures/documents/pdfplumber_number_split_scenarios.pdf
    rules:
      - NUM-REFOOT
      - NUM-CROSSFOOT
    expected:
      - rule_id: NUM-REFOOT
        verdict: pass
      - rule_id: NUM-CROSSFOOT
        verdict: pass
  - id: text_underline_validation
    description: "Tests that statement totals and subtotals are correctly underlined -single or double-"
    document: tests/fixtures/documents/underline_test_scenarios.pdf
    rules:
      - FMT-DOUBLE-UNDERLINE
    expected:
      - rule_id: FMT-DOUBLE-UNDERLINE
        verdict: pass
        pages: [7, 9, 11]
      - rule_id: FMT-DOUBLE-UNDERLINE
        verdict: fail
        pages: [1, 2, 3, 4, 5, 6, 8, 10, 12]
  - id: multi_page_rules
    description: "Tests multi-page rule application"
    document: tests/fixtures/documents/multi_page_rules_doc.pdf
    rules:
      - SCP-SECTIONS-PRESENT
      - TOC-PAGE-NUMBERS-MATCH
      - TOC-COMPLETENESS
      - DATE-CONSISTENCY-PACK
      - DUP-TOTALS
      - TIE-CASH
      - TIE-PARTNERS-CAP
      - TIE-NET-GAIN
    expected:
      # Document-scope rules
      - rule_id: SCP-SECTIONS-PRESENT
        verdict: fail # missing "Schedule of Investments" section
      - rule_id: TOC-PAGE-NUMBERS-MATCH
        verdict: needs_review
      - rule_id: TOC-COMPLETENESS
        verdict: needs_review
      - rule_id: DATE-CONSISTENCY-PACK
        verdict: pass
      - rule_id: DUP-TOTALS
        verdict: pass
      # Multi-page tie-outs
      - rule_id: TIE-CASH
        verdict: pass
      - rule_id: TIE-PARTNERS-CAP
        verdict: pass
      - rule_id: TIE-NET-GAIN
        verdict: pass
  - id: schedule_of_investments_rules
    description: "Tests Schedule of Investments rules"
    document: tests/fixtures/documents/schedule_of_investments_doc.pdf
    rules:
      - SCP-SECTIONS-PRESENT
      - TIE-SOI-BS
      - BS-TIE-OUTS
      - SOI-PERCENTAGE-TIE
    expected:
      - rule_id: SCP-SECTIONS-PRESENT
        verdict: pass
      - rule_id: TIE-SOI-BS
        verdict: pass
      - rule_id: BS-TIE-OUTS
        verdict: pass
      - rule_id: SOI-PERCENTAGE-TIE
        verdict: fail # disclosed percentages gap >= 0.02 percentage-point