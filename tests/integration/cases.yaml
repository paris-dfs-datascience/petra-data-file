# Ground-truth integration test cases for petra-data-file validation pipeline.
# Generated by human review of 10 Error/Corrected PDF pairs.
#
# COVERAGE GAPS — error categories with NO existing rule to catch them:
#   LINE-ORDER      : Line item ordering within statement sections (E-1, E-3, E-4)
#   STMT-PERIOD     : Statement period header vs actual data date range (F-1, F-2)
#   LABEL-ACCURACY  : Line item / note label factual accuracy (GC-5, GC-7, GC-8, T-2)
#   NOTE-NUMERIC    : Note dollar amount accuracy vs supporting schedules (IV-3)
#   MISSING-CONTENT : Missing required rows or entire statement sections (A-3)
#
# HOW TO USE:
#   1. Copy each PDF to tests/fixtures/documents/ in the petra-data-file repo
#   2. Run: python scripts/update_integration_expectations.py
#   3. Compare pipeline output against the expected verdicts below
#   4. Divergences on `fail` entries = coverage gaps or rule bugs
#
# VERDICT KEY:
#   fail          = rule should fire; a human reviewer would flag this error
#   pass          = rule should NOT fire; no error of this type present
#   not_applicable= this rule type does not apply to this document
#   needs_review  = rule may fire but outcome is uncertain (see comment)

cases:
- id: number_split_formatting
  description: Tests that numbers are not split with a whitespace by the pdfplumber parser
  document: tests/fixtures/documents/pdfplumber_number_split_scenarios.pdf
  rules:
  - NUM-REFOOT
  - NUM-CROSSFOOT
  expected:
  - rule_id: NUM-REFOOT
    verdict: pass
  - rule_id: NUM-CROSSFOOT
    verdict: pass
- id: text_underline_validation
  description: Tests that statement totals and subtotals are correctly underlined -single or double-
  document: tests/fixtures/documents/underline_test_scenarios.pdf
  rules:
  - FMT-DOUBLE-UNDERLINE
  expected:
  - rule_id: FMT-DOUBLE-UNDERLINE
    verdict: pass
    pages:
    - 7
    - 9
    - 11
  - rule_id: FMT-DOUBLE-UNDERLINE
    verdict: fail
    pages:
    - 1
    - 2
    - 3
    - 4
    - 5
    - 6
    - 8
    - 10
    - 12
